version: '3.8'
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - 27017:27017

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - 5001:5001
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - 3000:3000
    depends_on:
      - backend

volumes:
  mongo-data:
